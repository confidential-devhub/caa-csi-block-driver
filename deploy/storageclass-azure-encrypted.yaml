apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: caa-block-azure-encrypted
parameters:
  cloudProvider: azure
  azureSubscriptionId: "<AZURE_SUBSCRIPTION_ID>"
  azureResourceGroup: "<AZURE_RESOURCE_GROUP>"
  azureLocation: eastus
  azureDiskSKU: StandardSSD_LRS
  # CDH encryption parameters
  cdhEncryptionType: luks2
  cdhSourceType: empty
  cdhTargetType: fileSystem
  cdhFilesystemType: ext4
  cdhKey: "kbs:///default/luks-key/volume-key"
provisioner: caa-csi-block.csi.confidentialcontainers.io
reclaimPolicy: Delete
volumeBindingMode: Immediate
