apiVersion: v1
kind: ConfigMap
metadata:
  name: caa-csi-bootstrap-params
  namespace: caa-csi-block
  labels:
    app: caa-csi-block
data:
  # Same keys as the Azure StorageClass — used for empty-store recovery / delete fallback.
  # Replace the placeholders before applying.
  bootstrap-params.json: |
    {
      "cloudProvider": "azure",
      "azureSubscriptionId": "<AZURE_SUBSCRIPTION_ID>",
      "azureResourceGroup": "<AZURE_RESOURCE_GROUP>",
      "azureLocation": "eastus",
      "azureDiskSKU": "StandardSSD_LRS"
    }
