{{- include "caa-csi.validateValues" . }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "caa-csi.fullname" . }}
  namespace: {{ include "caa-csi.namespace" . }}
  labels:
    {{- include "caa-csi.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "caa-csi.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "caa-csi.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "caa-csi.serviceAccountName" . }}
      containers:
        - name: csi-provisioner
          image: {{ .Values.sidecarImages.provisioner }}
          args:
            - "-v=3"
            - "--csi-address=/csi/csi.sock"
            - "--worker-threads=5"
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          {{- with .Values.resources.provisioner }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            privileged: {{ .Values.nodePlugin.privileged }}
          volumeMounts:
            - mountPath: /csi
              name: socket-dir

        - name: node-driver-registrar
          image: {{ .Values.sidecarImages.nodeDriverRegistrar }}
          args:
            - "--v=3"
            - "--csi-address=/csi/csi.sock"
            - "--kubelet-registration-path=/var/lib/kubelet/plugins/caa-csi-block/csi.sock"
          env:
            - name: KUBE_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          {{- with .Values.resources.nodeDriverRegistrar }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            privileged: {{ .Values.nodePlugin.privileged }}
          volumeMounts:
            - mountPath: /csi
              name: socket-dir
            - mountPath: /registration
              name: registration-dir

        - name: caa-csi-block-driver
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--drivername={{ .Values.csiDriver.name }}"
            - "--endpoint=unix:///csi/csi.sock"
            - "--nodeid=$(KUBE_NODE_NAME)"
          env:
            - name: KUBE_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: CSI_CLOUD_PROVIDER
              value: {{ .Values.provider | quote }}
            - name: CSI_BOOTSTRAP_PARAMS_FILE
              value: /etc/caa-csi-block/bootstrap-params.json
            {{- if eq .Values.provider "aws" }}
            - name: AWS_REGION
              value: {{ required "aws.region is required when provider=aws" .Values.aws.region | quote }}
            {{- if and (not .Values.aws.irsa.enabled) .Values.aws.staticCredentials.enabled }}
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.aws.staticCredentials.secretName }}
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.aws.staticCredentials.secretName }}
                  key: AWS_SECRET_ACCESS_KEY
            {{- end }}
            {{- end }}
          {{- with .Values.resources.driver }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            privileged: {{ .Values.nodePlugin.privileged }}
          volumeMounts:
            - mountPath: /csi
              name: socket-dir
            - mountPath: /var/lib/kubelet/pods
              name: mountpoint-dir
              mountPropagation: Bidirectional
            - mountPath: /var/lib/kubelet/plugins
              name: plugins-dir
              mountPropagation: Bidirectional
            - mountPath: /run/kata-containers/shared/direct-volumes
              name: shared-directvols
            - mountPath: /var/lib/caa-csi-block
              name: csi-data
            - mountPath: /etc/caa-csi-block
              name: bootstrap-params
              readOnly: true
            {{- if eq .Values.provider "libvirt" }}
            - mountPath: {{ .Values.libvirt.volumeDir }}
              name: libvirt-pool
            {{- end }}

      volumes:
        - name: socket-dir
          hostPath:
            path: /var/lib/kubelet/plugins/caa-csi-block
            type: DirectoryOrCreate
        - name: mountpoint-dir
          hostPath:
            path: /var/lib/kubelet/pods
            type: DirectoryOrCreate
        - name: registration-dir
          hostPath:
            path: /var/lib/kubelet/plugins_registry
            type: Directory
        - name: plugins-dir
          hostPath:
            path: /var/lib/kubelet/plugins
            type: Directory
        - name: shared-directvols
          hostPath:
            path: /run/kata-containers/shared/direct-volumes/
            type: DirectoryOrCreate
        - name: csi-data
          hostPath:
            path: /var/lib/caa-csi-block
            type: DirectoryOrCreate
        - name: bootstrap-params
          configMap:
            name: {{ include "caa-csi.bootstrapConfigMapName" . }}
        {{- if eq .Values.provider "libvirt" }}
        - name: libvirt-pool
          hostPath:
            path: {{ .Values.libvirt.volumeDir }}
            type: DirectoryOrCreate
        {{- end }}
