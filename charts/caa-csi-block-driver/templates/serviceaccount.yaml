{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "caa-csi.serviceAccountName" . }}
  namespace: {{ include "caa-csi.namespace" . }}
  labels:
    {{- include "caa-csi.labels" . | nindent 4 }}
  {{- $annotations := dict }}
  {{- if and (eq .Values.provider "aws") .Values.aws.irsa.enabled .Values.aws.irsa.roleArn }}
  {{- $_ := set $annotations "eks.amazonaws.com/role-arn" .Values.aws.irsa.roleArn }}
  {{- end }}
  {{- range $k, $v := .Values.serviceAccount.annotations }}
  {{- $_ := set $annotations $k $v }}
  {{- end }}
  {{- if $annotations }}
  annotations:
    {{- toYaml $annotations | nindent 4 }}
  {{- end }}
{{- end }}
