# Cloud provider: aws, azure, or libvirt
provider: aws

nameOverride: ""
fullnameOverride: ""

image:
  repository: ghcr.io/confidential-devhub/caa-csi-block-driver
  tag: 0.2.0
  pullPolicy: IfNotPresent

namespace:
  name: caa-csi-block
  create: true

sidecarImages:
  provisioner: registry.k8s.io/sig-storage/csi-provisioner:v3.6.0
  nodeDriverRegistrar: registry.k8s.io/sig-storage/csi-node-driver-registrar:v2.9.0

csiDriver:
  name: caa-csi-block.csi.confidentialcontainers.io

# AWS provider settings
aws:
  region: ""
  availabilityZone: ""
  volumeType: gp3
  irsa:
    enabled: false
    roleArn: ""
  staticCredentials:
    enabled: false
    secretName: caa-csi-aws-creds

# Azure provider settings
azure:
  subscriptionId: ""
  resourceGroup: ""
  location: ""
  diskSku: StandardSSD_LRS

# Libvirt provider settings
libvirt:
  volumeDir: /var/lib/caa-csi-volumes

# CDH encryption settings (optional, for CDH-based LUKS encryption)
cdh:
  enabled: false
  encryptionType: luks2
  sourceType: empty
  targetType: fileSystem
  filesystemType: ext4
  key: ""

storageClass:
  create: true
  name: ""
  reclaimPolicy: Delete
  volumeBindingMode: Immediate

serviceAccount:
  create: true
  name: ""
  annotations: {}

nodePlugin:
  privileged: true
